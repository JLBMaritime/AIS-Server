# /etc/NetworkManager/conf.d/wifi-powersave-off.conf
#
# Disable Wi-Fi power-save on the Raspberry Pi 4B.
#
# The Broadcom 43455 firmware (brcmfmac) is known to wedge under low-traffic
# conditions when power-save is enabled.  When that happens the radio stays
# associated to the AP but TCP packets stop flowing, every network-bound
# thread inside ais-server blocks in the kernel, the box becomes unreachable
# over SSH, and the only recovery is a power cycle.
#
# wifi.powersave values:
#   0 = use default       1 = ignore (do nothing)
#   2 = disable           3 = enable
#
# We force 2 (disable) here.  A belt-and-braces oneshot unit
# (ais-wifi-powersave-off.service) also runs `iw dev wlan0 set power_save off`
# at boot in case NetworkManager is restarted/reconfigured.
[connection]
wifi.powersave = 2
