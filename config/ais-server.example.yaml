# /etc/ais-server/config.yaml
# AIS-Server runtime configuration.  Safe to edit – the service auto-reloads
# on SIGHUP (`sudo systemctl reload ais-server`) or a full restart.

ingest:
  # TCP port AIS nodes push NMEA sentences to.  Standard AIS port = 10110.
  tcp_port: 10110
  # Bind address (0.0.0.0 accepts on every interface; firewall restricts origin).
  bind: "0.0.0.0"
  # Maximum concurrent node connections.
  max_clients: 64
  # Idle timeout (seconds) – a silent socket is dropped after this long.
  idle_timeout: 120

dedup:
  # Window in which duplicates of the same sentence (from different nodes)
  # are collapsed.  Larger = more dedup across laggy nodes, uses more RAM.
  ttl_seconds: 30
  # Safety cap on number of hashes cached.
  max_entries: 200000

reorder:
  # Jitter-buffer hold time in milliseconds.  Sentences are released in
  # timestamp order once `now - ts >= hold_ms`.  Must be well below 10 000
  # to satisfy the <10 s latency requirement.
  hold_ms: 2000
  # Safety cap on queued (undelivered) sentences.
  max_queue: 50000

forwarder:
  # Default protocol for new endpoints.  Supported: tcp.  (udp / http
  # scaffolded for a future release – UI hides them until enabled here.)
  default_protocol: tcp
  # Per-endpoint bounded queue.  When full, oldest entries are dropped.
  queue_size: 10000
  # How many times to retry a failed endpoint (exponential backoff).
  max_retries: 10
  # Initial backoff (seconds) – doubles each retry up to 30 s cap.
  backoff_initial: 1.0

web:
  host: "0.0.0.0"
  port: 80
  # Set to a valid cert / key pair to force HTTPS.  Leave null for HTTP only.
  tls_cert: null
  tls_key: null
  # Secret key used for session signing.  Auto-generated on first run and
  # stored in /var/lib/ais-server/secret_key if this stays empty.
  secret_key: ""

security:
  force_password_change_on_first_login: true
  # bcrypt cost factor (higher = slower = more secure).  12 is a good RPi 4 default.
  bcrypt_rounds: 12
  # Session lifetime in minutes.
  session_minutes: 240

logging:
  # Logs are written to stdout, captured by systemd-journald.  This `path`
  # entry is kept for backwards-compatibility but is no longer used; tail the
  # journal instead:  `journalctl -u ais-server -f`.
  path: "/var/log/ais-server"
  level: "INFO"           # DEBUG / INFO / WARNING / ERROR

# Network self-test / auto-recovery.  On the Pi 4B the Broadcom Wi-Fi
# firmware can wedge under low-traffic conditions; this thread probes the
# default gateway every `interval` seconds and bounces wlan0 via nmcli after
# `fail_threshold` consecutive failures.  Set auto_recover: false to log
# only and never touch the interface.
netcheck:
  interval: 30            # seconds between probes
  fail_threshold: 3       # consecutive failures that trigger a recovery
  timeout: 4              # seconds per probe
  host: null              # null = use the default-route gateway
  port: 53                # TCP port to probe (53/DNS is almost always open)
  interface: "wlan0"
  auto_recover: true


# Low-disk watchdog and host-info source for the System / Dashboard pages.
# `interval` controls how often we sample free space.  We log a WARNING the
# first time we cross `warn_water_mb`, and an ERROR (with a red banner in the
# UI) the first time we cross `low_water_mb`.  Transitions both ways are
# logged exactly once – no spam.
diskcheck:
  interval: 60
  data_path: "/var"
  warn_water_mb: 1500
  low_water_mb: 500

# Housekeeping schedule for the SQLite database and the in-memory node
# registry.  All actions run on a single background thread and never touch
# the hot NMEA path.  Set any interval to 0 to disable that task.
maintenance:
  # WAL checkpoint(TRUNCATE) – stops the -wal file growing unboundedly when
  # there are long-lived readers.  Hourly is plenty.
  wal_checkpoint_interval: 3600
  # Full VACUUM – the DB is tiny so this is essentially free.  Weekly.
  vacuum_interval: 604800
  # Drop Nodes-page entries that have been disconnected for longer than this
  # (seconds).  Set to 0 to remember every node that ever connected.
  node_max_age: 2592000        # 30 days
  node_prune_interval: 3600

# Backup retention for **on-disk** backups (browser downloads are always
# kept by the user).  When the System page is asked to "save copy on Pi",
# the newest `retention` files in paths.backup are kept; older ones are
# pruned automatically.  Set to 0 to keep every backup forever.
backups:
  retention: 14


# Paths – normally you don't need to change these.
paths:
  db:      "/var/lib/ais-server/ais.db"
  secret:  "/var/lib/ais-server/secret_key"
  backup:  "/var/lib/ais-server/backups"
