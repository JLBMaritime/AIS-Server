# /etc/systemd/journald.conf.d/ais-server.conf
# Installed by AIS-Server's install.sh.
#
# Bounds the on-disk size of the persistent journal so a long-running
# RPi can never fill its SD card with logs.  Without this drop-in, journald
# defaults to "10 % of /var, capped at 4 GB" which is fine on a fresh card
# but quite a lot for a tiny SD that also has to hold the OS.
#
# Tunables (override by editing this file and `systemctl restart
# systemd-journald`):
#
#   SystemMaxUse        Hard ceiling for total journal disk usage.
#   SystemKeepFree      Always leave at least this much free on /var.
#   SystemMaxFileSize   Each individual journal file is rotated at this size.
#   MaxRetentionSec     Older entries than this are deleted.
#
# 500 M / 14 days is plenty for INFO-level logging at ~100 msgs/s and still
# survives a crash investigation that goes back several days.

[Journal]
Storage=persistent
SystemMaxUse=500M
SystemKeepFree=1G
SystemMaxFileSize=50M
MaxRetentionSec=14day
# Compress old journals (default but make explicit).
Compress=yes
# Forward to wall only for emergency messages – avoids console spam.
ForwardToWall=no
